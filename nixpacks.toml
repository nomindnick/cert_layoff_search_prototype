# nixpacks.toml — alternative Railway build (used when not building from the Dockerfile).
# Provides Node 20 + Python 3.12, builds the SPA, then serves via uvicorn.

[phases.setup]
nixPkgs = ["nodejs_20", "python312", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"

[variables]
ENV = "production"
